version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - bodyclose
    - noctx
    - gosec
    - unconvert
    - unparam
    - whitespace

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      excludes:
        - G204

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
