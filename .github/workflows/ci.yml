name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  build-binaries:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: gao-pr-${{ github.event.number }}
          path: dist/gao_*
          retention-days: 7

      - name: Comment download link on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-artifacts
          message: |
            ### 📦 Test binaries

            Built from ${{ github.sha }} — [download artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            | Platform | Archive |
            |----------|---------|
            | Linux amd64 | `gao_linux_amd64.tar.gz` |
            | Linux arm64 | `gao_linux_arm64.tar.gz` |
            | macOS amd64 | `gao_darwin_amd64.tar.gz` |
            | macOS arm64 | `gao_darwin_arm64.tar.gz` |
